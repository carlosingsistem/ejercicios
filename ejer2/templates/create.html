{% extends 'base.html '%}

{% block content %}
<h2>Añadir Producto a Carrito</h2>
<form action="{{ url_for("add_item")}}" method="post">
    <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Product</label>
        <input type="text" class="form-control" id="exampleFormControlInput1" name="producto"
            placeholder="Product">
    </div>
    <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Price</label>
        <input type="number" step="0.01" class="form-control" id="exampleFormControlInput1" name="precio"
            placeholder="Price">
    </div>
    <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Quantity</label>
        <input type="number" class="form-control" id="exampleFormControlInput1" name="cantidad"
            placeholder="Quantity">
    </div>

    <div class="mb-3">
        <button type="submit" class="btn btn-primary mb-3">Confirm</button>
        <a class="btn btn-info mb-3" href="{{ url_for("index") }}">Cancelar</a>
    </div>
</form>
{% endblock %}
